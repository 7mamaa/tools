<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المشاريع | Project Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #a78bfa;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: #f8fafc;
            position: relative;
        }

        .card:hover {
            border-color: #64748b;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
        }



        .card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card p {
            font-size: .9rem;
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .btn-arrow {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: .72rem;
            padding: 3px 9px;
            border-radius: 12px;
            background: #334155;
            color: #94a3b8;
        }

        @media (max-width: 992px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>مستودع المشاريع</h1>
        <p>واجهة موحدة للوصول إلى كافة الأدوات والتطبيقات</p>
    </header>

    <div class="grid-container" id="projects-grid">
        <p style="grid-column: 1 / -1; text-align: center; color: #94a3b8;">جاري تحميل المشاريع...</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById("projects-grid");

            fetch("files.json")
                .then(response => {
                    if (!response.ok) throw new Error("Network response was not ok");
                    return response.json();
                })
                .then(data => {
                    gridContainer.innerHTML = "";
                    data.forEach(project => {
                        const card = document.createElement("a");
                        card.href = project.url;
                        card.className = "card";

                        card.innerHTML = `
                            <div class="badge">${project.badge}</div>
                            <div class="icon-box" style="background: ${project.iconBg}; color: ${project.iconColor};">
                                <i class="${project.icon}"></i>
                            </div>
                            <h3>${project.title}</h3>
                            <p>${project.description}</p>
                            <div class="btn-arrow"><i class="fa-solid fa-arrow-left"></i></div>
                        `;
                        gridContainer.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error("Error loading projects:", error);
                    gridContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #f87171; background: #1e293b; padding: 20px; border-radius: 8px;">حدث خطأ أثناء تحميل المشاريع (تأكد من فتح الصفحة عبر خادم محلي Local Server).</p>';
                });
        });
    </script>
</body>

</html>
