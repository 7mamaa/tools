<body class="font-sans transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import html2canvas from 'html2canvas';
    import Papa from 'papaparse';
    import jsPDF from 'jspdf';
    import autoTable from 'jspdf-autotable';
    import { Upload, FileType, AlertCircle, Copy, Check, Sparkles, ClipboardList, FileText, Download, FileJson, Palette, Menu, X, Network, BarChart, ExternalLink, BrainCircuit, BookOpen, Sun, Moon, Type, Layout, GitBranch, GitMerge, Share2, Zap, Star, Activity, Heart, Shield, Thermometer, Droplets, Wind, Hexagon, Dna, History, Clock, Edit2, Trash2, AlignLeft, AlignRight, Maximize2, Minimize2 } from 'lucide-react';
    import ArabicReshaper from 'arabic-reshaper';

    // --- THEMES ---
    const themes = {
      orange: {
        id: 'orange',
        name: 'Medical Orange',
        primary: '#EA580C',
        secondary: '#7E22CE',
        title: '#1E40AF',
        light: '#FFF7ED',
        border: '#FED7AA',
        hover: '#F97316',
        highlight: '#FFEDD5',
        highlightBorder: '#FED7AA',
        gradient: 'gradient-bg-orange',
        textGradient: 'gradient-text-orange',
        icon: Dna
      },
      blue: {
        id: 'blue',
        name: 'Clinical Blue',
        primary: '#2563EB',
        secondary: '#0D9488',
        title: '#1E3A8A',
        light: '#EFF6FF',
        border: '#BFDBFE',
        hover: '#3B82F6',
        highlight: '#DBEAFE',
        highlightBorder: '#BFDBFE',
        gradient: 'gradient-bg-blue',
        textGradient: 'gradient-text-blue',
        icon: Droplets
      },
      red: {
        id: 'red',
        name: 'Urgent Red',
        primary: '#DC2626',
        secondary: '#9A3412',
        title: '#7F1D1D',
        light: '#FEF2F2',
        border: '#FECACA',
        hover: '#EF4444',
        highlight: '#FEE2E2',
        highlightBorder: '#FECACA',
        gradient: 'gradient-bg-red',
        textGradient: 'gradient-text-red',
        icon: Activity
      },
      green: {
        id: 'green',
        name: 'Nature Green',
        primary: '#16A34A',
        secondary: '#0F766E',
        title: '#14532D',
        light: '#F0FDF4',
        border: '#BBF7D0',
        hover: '#22C55E',
        highlight: '#DCFCE7',
        highlightBorder: '#BBF7D0',
        gradient: 'gradient-bg-green',
        textGradient: 'gradient-text-green',
        icon: Shield
      },
      purple: {
        id: 'purple',
        name: 'Royal Purple',
        primary: '#9333EA',
        secondary: '#DB2777',
        title: '#581C87',
        light: '#FAF5FF',
        border: '#E9D5FF',
        hover: '#A855F7',
        highlight: '#F3E8FF',
        highlightBorder: '#E9D5FF',
        gradient: 'gradient-bg-purple',
        textGradient: 'gradient-text-purple',
        icon: Wind
      }
    };

    // --- UTILS ---

    const renderRichText = (text) => {
      if (!text) return null;
      const parts = text.split(/(\*\*.*?\*\*)/g);
      return parts.map((part, index) => {
        if (part.startsWith('**') && part.endsWith('**')) {
          return <strong key={index} className="font-bold">{part.slice(2, -2)}</strong>;
        }
        return <span key={index}>{part}</span>;
      });
    };

    const mdToHtml = (text) => {
      if (!text) return '';
      return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    };

    const hexToRgb = (hex) => {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 255, g: 255, b: 255 };
    };

    // --- LOCAL STORAGE UTILS ---
    const STORAGE_KEY = 'arcaneNotes_recent';

    const saveToRecent = (data) => {
      try {
        const recent = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const newItem = {
          id: Date.now(),
          title: data.title,
          timestamp: new Date().toISOString(),
          data: data
        };

        // Add to beginning, limit to 10 items
        const updated = [newItem, ...recent].slice(0, 10);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        return updated;
      } catch (e) {
        console.error('Failed to save to localStorage:', e);
        return [];
      }
    };

    // NEW: Update an existing item in history
    const updateRecentItem = (itemId, updatedData) => {
      try {
        const recent = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const updated = recent.map(item =>
          item.id === itemId ? { ...item, title: updatedData.title, data: updatedData, timestamp: new Date().toISOString() } : item
        );
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        return updated;
      } catch (e) {
        console.error('Failed to update localStorage:', e);
        return [];
      }
    };

    // NEW: Delete an item from history
    const deleteRecentItem = (itemId) => {
      try {
        const recent = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const updated = recent.filter(item => item.id !== itemId);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        return updated;
      } catch (e) {
        console.error('Failed to delete from localStorage:', e);
        return [];
      }
    };

    const loadRecent = () => {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (e) {
        console.error('Failed to load from localStorage:', e);
        return [];
      }
    };

    const clearRecent = () => {
      localStorage.removeItem(STORAGE_KEY);
    };

    // --- SERVICES ---

    const parseCSVData = (csvText, fileName) => {
      const parseResult = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        transformHeader: (h) => h.trim(),
      });

      if (parseResult.errors.length > 0) {
        console.warn("CSV Parse Errors:", parseResult.errors);
      }

      const rows = parseResult.data;

      if (!rows.length) {
        throw new Error("The CSV file is empty.");
      }

      const firstRow = rows[0];
      const headers = Object.keys(firstRow).map(h => h.toLowerCase());

      if (!headers.includes('section') || !headers.includes('type') || !headers.includes('content')) {
        throw new Error("Invalid CSV format. Please ensure headers are: Section, Type, Content.");
      }

      const sectionsMap = new Map();
      const sectionsOrder = [];

      rows.forEach((row) => {
        const sectionKey = Object.keys(row).find(k => k.toLowerCase() === 'section');
        const typeKey = Object.keys(row).find(k => k.toLowerCase() === 'type');
        const contentKey = Object.keys(row).find(k => k.toLowerCase() === 'content');

        const sectionName = sectionKey ? row[sectionKey]?.trim() : '';
        const rawType = typeKey ? row[typeKey]?.trim().toLowerCase() : '';
        const content = contentKey ? row[contentKey]?.trim() : '';

        if (!sectionName || !content) return;

        let type = 'text';
        if (['subheader', 'list', 'table', 'highlight', 'warning', 'text'].includes(rawType)) {
          type = rawType;
        }

        if (!sectionsMap.has(sectionName)) {
          sectionsMap.set(sectionName, []);
          sectionsOrder.push(sectionName);
        }

        const block = { type };

        if (type === 'list') {
          block.items = content.split('|').map(item => item.trim()).filter(i => i);
        } else if (type === 'table') {
          const rows = content.split(';').map(r => r.trim()).filter(r => r);
          if (rows.length > 0) {
            const headers = rows[0].split('|').map(h => h.trim());
            const bodyRows = rows.slice(1).map(r => r.split('|').map(c => c.trim()));
            block.table = { headers, rows: bodyRows };
          }
        } else {
          block.text = content;
        }

        sectionsMap.get(sectionName).push(block);
      });

      const sections = sectionsOrder.map(title => ({
        title,
        content: sectionsMap.get(title) || []
      }));

      const title = fileName.replace(/\.(csv|txt)$/i, '').replace(/_/g, ' ');

      return { title, sections };
    };

    // --- Arabic Text Detection Helper ---
    const containsArabic = (text) => /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(text);

    // --- Arabic Text Processing for jsPDF (reshape + word-level bidi for RTL) ---
    const processArabicText = (text) => {
      if (!text || !containsArabic(text)) return text;
      try {
        // Step 1: Reshape Arabic characters to proper connected forms
        const reshaped = ArabicReshaper.convertArabic(text);

        // Step 2: Word-level bidi reordering for jsPDF's LTR renderer
        // Split into tokens preserving whitespace
        const tokens = reshaped.split(/(\s+)/);

        // Step 3: Process each token individually
        const processed = tokens.map(token => {
          if (/^\s+$/.test(token)) return token; // whitespace: keep as-is
          if (containsArabic(token)) {
            // Reverse Arabic token characters for RTL display in LTR engine
            return [...token].reverse().join('');
          }
          return token; // Keep Latin/digit tokens in original LTR order
        });

        // Step 4: Reverse overall token order for RTL base direction
        processed.reverse();

        return processed.join('');
      } catch (e) {
        console.warn('Arabic text processing failed:', e);
        return text;
      }
    };

    // --- Font Cache (loaded once, reused across exports) ---
    let _amiriFontCache = { regular: null, bold: null };

    const loadAmiriFont = async () => {
      if (_amiriFontCache.regular && _amiriFontCache.bold) return _amiriFontCache;

      const toBase64 = (buffer) => {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.byteLength; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      };

      const [regularBuf, boldBuf] = await Promise.all([
        fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/amiri/Amiri-Regular.ttf').then(r => r.arrayBuffer()),
        fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/amiri/Amiri-Bold.ttf').then(r => r.arrayBuffer())
      ]);

      _amiriFontCache.regular = toBase64(regularBuf);
      _amiriFontCache.bold = toBase64(boldBuf);
      return _amiriFontCache;
    };

    const generatePDF = async (data, theme, fontScale, pdfDirection = 'auto') => {
      // Load Arabic font
      const amiriFont = await loadAmiriFont();

      const doc = new jsPDF();

      // Register Amiri font with jsPDF
      doc.addFileToVFS('Amiri-Regular.ttf', amiriFont.regular);
      doc.addFileToVFS('Amiri-Bold.ttf', amiriFont.bold);
      doc.addFont('Amiri-Regular.ttf', 'Amiri', 'normal');
      doc.addFont('Amiri-Bold.ttf', 'Amiri', 'bold');

      const pageWidth = doc.internal.pageSize.width;
      const pageHeight = doc.internal.pageSize.height;
      const margin = 15;
      const contentWidth = pageWidth - (margin * 2);
      let yPos = 20;

      const s = (size) => size * fontScale;

      // Helper: choose the correct font based on text content
      const pickFont = (text) => containsArabic(text) ? 'Amiri' : 'times';

      const checkPageBreak = (heightNeeded) => {
        if (yPos + heightNeeded > pageHeight - margin) {
          doc.addPage();
          yPos = 20;
        }
      };

      // --- Determine global RTL direction ---
      // If pdfDirection is 'auto', detect by scanning all content for Arabic
      let isRTL = false;
      if (pdfDirection === 'rtl') {
        isRTL = true;
      } else if (pdfDirection === 'ltr') {
        isRTL = false;
      } else {
        // Auto-detect: scan title + all section content for Arabic
        const allText = [
          data.title || '',
          data.subtitle || '',
          ...data.sections.flatMap(sec => [
            sec.title || '',
            ...sec.content.flatMap(block => {
              if (block.text) return [block.text];
              if (block.items) return block.items;
              if (block.table) return [...block.table.headers, ...block.table.rows.flat()];
              return [];
            })
          ])
        ].join(' ');
        isRTL = containsArabic(allText);
      }

      const forceRTL = isRTL;
      const forceLTR = !isRTL;

      // --- RTL Helper Functions ---
      // Get X position based on RTL/LTR direction
      const getX = (offsetFromStart = 0) => {
        if (isRTL) {
          return pageWidth - margin - offsetFromStart;
        }
        return margin + offsetFromStart;
      };

      // Text alignment option
      const alignOpt = isRTL ? 'right' : 'left';

      // Arrow character for RTL/LTR
      const arrowChar = isRTL ? '<' : '>';

      // Font selection helper
      const selectFont = (text) => isRTL ? 'Amiri' : pickFont(text);

      // Process text for rendering (handles Arabic reshaping)
      const prepareText = (text, forceProcess = false) => {
        if (forceProcess || isRTL || containsArabic(text)) {
          return processArabicText(text);
        }
        return text;
      };

      // --- drawRichText with full RTL support ---
      const drawRichText = (text, x, y, maxWidth, defaultFontSize = 10, defaultColor = [0, 0, 0]) => {
        const scaledFontSize = s(defaultFontSize);
        const lineHeight = scaledFontSize * 0.5;
        const fontName = selectFont(text);
        doc.setFontSize(scaledFontSize);
        doc.setTextColor(defaultColor[0], defaultColor[1], defaultColor[2]);

        // For RTL text, render as whole lines with right alignment
        if (isRTL || containsArabic(text)) {
          doc.setFont('Amiri', "normal");

          // Parse bold markers
          const parts = text.split(/(\*\*.*?\*\*)/g);
          const segments = [];
          parts.forEach(part => {
            const isBoldPart = part.startsWith('**') && part.endsWith('**');
            const content = isBoldPart ? part.slice(2, -2) : part;
            if (content) segments.push({ text: content, bold: isBoldPart });
          });

          // Build full clean text and split into lines
          const fullCleanText = segments.map(seg => seg.text).join('');
          const processedText = processArabicText(fullCleanText);
          const lines = doc.splitTextToSize(processedText, maxWidth);

          let currentY = y;
          lines.forEach(line => {
            if (currentY > pageHeight - margin) {
              doc.addPage();
              currentY = 20;
            }
            // Check if any segment was bold - apply bold to entire line if needed
            const hasBold = segments.some(seg => seg.bold && fullCleanText.includes(seg.text));
            doc.setFont('Amiri', hasBold ? 'bold' : 'normal');
            doc.text(line, getX(), currentY, { align: alignOpt });
            currentY += lineHeight + 2;
          });
          return currentY;
        }

        // Latin text: word-by-word rendering (original LTR logic)
        doc.setFont(fontName, "normal");
        const parts = text.split(/(\*\*.*?\*\*)/g);
        let currentX = x;
        let currentY = y;

        const words = [];

        parts.forEach(part => {
          const isBold = part.startsWith('**') && part.endsWith('**');
          const content = isBold ? part.slice(2, -2) : part;
          const tokens = content.split(/(\s+)/);
          tokens.forEach(token => {
            if (token.length > 0) {
              words.push({ text: token, bold: isBold });
            }
          });
        });

        words.forEach(wordObj => {
          doc.setFont(fontName, wordObj.bold ? "bold" : "normal");
          const width = doc.getTextWidth(wordObj.text);

          if (currentX + width > pageWidth - margin) {
            currentX = margin;
            currentY += lineHeight + 2;
            if (/^\s+$/.test(wordObj.text)) return;
          }

          if (currentY > pageHeight - margin) {
            doc.addPage();
            currentY = 20;
            currentX = margin;
          }

          doc.text(wordObj.text, currentX, currentY);
          currentX += width;
        });
        return currentY + (lineHeight + 2);
      };

      // --- Title ---
      const titleFont = selectFont(data.title);
      doc.setFont(titleFont, "bold");
      doc.setTextColor(theme.title);
      doc.setFontSize(s(18));
      const titleRaw = isRTL ? data.title : data.title.toUpperCase();
      const title = isRTL ? processArabicText(titleRaw) : titleRaw;
      const titleWidth = doc.getTextWidth(title);
      doc.text(title, (pageWidth - titleWidth) / 2, yPos);

      if (data.subtitle) {
        yPos += s(8);
        const subFont = selectFont(data.subtitle);
        doc.setFont(subFont, "normal");
        doc.setFontSize(s(14));
        doc.setTextColor(0, 0, 0);
        const sub = isRTL ? processArabicText(data.subtitle) : data.subtitle;
        const subWidth = doc.getTextWidth(sub);
        doc.text(sub, (pageWidth - subWidth) / 2, yPos);
        doc.setDrawColor(0, 0, 0);
        doc.line((pageWidth - subWidth) / 2, yPos + 1, (pageWidth + subWidth) / 2, yPos + 1);
      }
      yPos += s(15);

      // --- Sections ---
      data.sections.forEach((section) => {
        checkPageBreak(s(20));

        // Section title
        const sectionFont = selectFont(section.title);
        doc.setFont(sectionFont, "bold");
        doc.setTextColor(theme.primary);
        doc.setFontSize(s(14));
        const sectionTitleRaw = isRTL ? section.title : section.title.toUpperCase();
        const sectionTitle = isRTL ? processArabicText(sectionTitleRaw) : sectionTitleRaw;
        doc.text(sectionTitle, getX(), yPos, { align: alignOpt });

        // Section title underline/decoration
        const sectionTitleWidth = doc.getTextWidth(sectionTitle);
        const lineStartX = isRTL ? (pageWidth - margin - sectionTitleWidth) : margin;
        const lineEndX = isRTL ? (pageWidth - margin) : (margin + sectionTitleWidth);
        doc.setDrawColor(theme.primary);
        doc.setLineWidth(0.5);
        doc.line(lineStartX, yPos + 2, lineEndX, yPos + 2);
        doc.setLineWidth(0.2);
        yPos += s(8);

        section.content.forEach((block) => {
          switch (block.type) {
            case 'subheader':
              checkPageBreak(s(10));
              if (block.text) {
                const shFont = selectFont(block.text);
                doc.setFont(shFont, "bold");
                doc.setTextColor(theme.secondary);
                doc.setFontSize(s(11));
                const subText = isRTL ? processArabicText(block.text) : block.text;
                // Draw arrow indicator
                const arrowX = getX();
                doc.text(`${arrowChar} ${subText}`, arrowX, yPos, { align: alignOpt });
              }
              yPos += s(6);
              break;

            case 'text':
              if (block.text) {
                checkPageBreak(s(20));
                yPos = drawRichText(block.text, margin, yPos, contentWidth, 10, [0, 0, 0]);
              }
              break;

            case 'warning':
              if (block.text) {
                checkPageBreak(s(15));
                const warnFont = selectFont(block.text);

                // Draw warning background bar
                const warnBarWidth = 3;
                if (isRTL) {
                  doc.setFillColor(200, 0, 0);
                  doc.rect(pageWidth - margin - warnBarWidth, yPos - s(3), warnBarWidth, s(6), 'F');
                } else {
                  doc.setFillColor(200, 0, 0);
                  doc.rect(margin, yPos - s(3), warnBarWidth, s(6), 'F');
                }

                const warningPrefix = isRTL ? `⚠ ملاحظة: ${block.text}` : `⚠ Note: ${block.text}`;
                const warnIndent = warnBarWidth + 3;
                const warnMaxWidth = contentWidth - warnIndent;

                if (isRTL) {
                  yPos = drawRichText(warningPrefix, margin, yPos, warnMaxWidth, 10, [200, 0, 0]);
                } else {
                  yPos = drawRichText(warningPrefix, margin + warnIndent, yPos, warnMaxWidth, 10, [200, 0, 0]);
                }
              }
              break;

            case 'highlight':
              if (block.text) {
                checkPageBreak(s(12));
                const cleanTextRaw = block.text.replace(/\*\*/g, '');
                const cleanText = isRTL ? processArabicText(cleanTextRaw) : cleanTextRaw;
                const hlFont = selectFont(cleanTextRaw);

                doc.setFont(hlFont, "bold");
                doc.setFontSize(s(10));
                const hlTextWidth = doc.getTextWidth(cleanText);

                const rgb = hexToRgb(theme.highlight);

                const maxWidth = contentWidth;
                if (hlTextWidth > maxWidth) {
                  const hlWords = cleanText.split(' ');
                  let line = '';
                  let lineY = yPos - s(4);
                  let lines = [];

                  hlWords.forEach(word => {
                    const testLine = line + (line ? ' ' : '') + word;
                    const testWidth = doc.getTextWidth(testLine);
                    if (testWidth > maxWidth && line) {
                      lines.push(line);
                      line = word;
                    } else {
                      line = testLine;
                    }
                  });
                  if (line) lines.push(line);

                  lines.forEach((lineText, index) => {
                    const lineWidth = doc.getTextWidth(lineText);
                    doc.setFillColor(rgb.r, rgb.g, rgb.b);
                    if (isRTL) {
                      doc.rect(pageWidth - margin - lineWidth - 1, lineY + (index * s(6)), lineWidth + 2, s(6), 'F');
                      doc.setTextColor(0, 0, 0);
                      doc.text(lineText, getX(), lineY + (index * s(6)) + s(4), { align: 'right' });
                    } else {
                      doc.rect(margin - 1, lineY + (index * s(6)), lineWidth + 2, s(6), 'F');
                      doc.setTextColor(0, 0, 0);
                      doc.text(lineText, margin, lineY + (index * s(6)) + s(4));
                    }
                  });

                  yPos = lineY + (lines.length * s(6)) + s(7);
                } else {
                  doc.setFillColor(rgb.r, rgb.g, rgb.b);
                  if (isRTL) {
                    doc.rect(pageWidth - margin - hlTextWidth - 1, yPos - s(4), hlTextWidth + 2, s(6), 'F');
                    doc.setTextColor(0, 0, 0);
                    doc.text(cleanText, getX(), yPos, { align: 'right' });
                  } else {
                    doc.rect(margin - 1, yPos - s(4), hlTextWidth + 2, s(6), 'F');
                    doc.setTextColor(0, 0, 0);
                    doc.text(cleanText, margin, yPos);
                  }
                  yPos += s(7);
                }
              }
              break;

            case 'list':
              if (block.items) {
                const bulletIndent = 6;
                block.items.forEach(item => {
                  checkPageBreak(s(7));
                  const liFont = selectFont(item);
                  doc.setFont(liFont, "normal");
                  doc.setTextColor(0, 0, 0);
                  doc.setFontSize(s(10));

                  // Draw bullet circle
                  const baseLineHeight = s(10) * 0.5;
                  if (isRTL) {
                    // RTL: bullet on the right side
                    const circleX = pageWidth - margin - 1;
                    doc.setFillColor(theme.primary);
                    doc.circle(circleX, yPos - (baseLineHeight / 3), 0.8, 'F');
                    // Text indented from right
                    const itemMaxWidth = contentWidth - bulletIndent;
                    const processedItem = processArabicText(item.replace(/\*\*/g, ''));
                    const lines = doc.splitTextToSize(processedItem, itemMaxWidth);
                    let itemY = yPos;
                    lines.forEach(line => {
                      if (itemY > pageHeight - margin) {
                        doc.addPage();
                        itemY = 20;
                      }
                      doc.text(line, pageWidth - margin - bulletIndent, itemY, { align: 'right' });
                      itemY += baseLineHeight + 2;
                    });
                    yPos = itemY;
                  } else {
                    // LTR: bullet on the left side
                    const circleX = margin + 1;
                    doc.setFillColor(theme.primary);
                    doc.circle(circleX, yPos - (baseLineHeight / 3), 0.8, 'F');
                    // Text indented from left
                    const contentX = margin + bulletIndent;
                    const itemMaxWidth = pageWidth - contentX - margin;
                    yPos = drawRichText(item, contentX, yPos, itemMaxWidth, 10, [0, 0, 0]);
                  }
                });
                yPos += s(2);
              }
              break;

            case 'table':
              if (block.table) {
                checkPageBreak(s(40));
                const cleanRowsRaw = block.table.rows.map(row => row.map(cell => cell.replace(/\*\*/g, '')));
                const cleanHeadersRaw = block.table.headers.map(h => h.replace(/\*\*/g, ''));
                // Process Arabic text in table cells
                const shouldProcessTable = isRTL || containsArabic([...cleanHeadersRaw, ...cleanRowsRaw.flat()].join(''));
                const cleanRows = shouldProcessTable ? cleanRowsRaw.map(row => row.map(cell => containsArabic(cell) ? processArabicText(cell) : cell)) : cleanRowsRaw;
                const cleanHeaders = shouldProcessTable ? cleanHeadersRaw.map(h => containsArabic(h) ? processArabicText(h) : h) : cleanHeadersRaw;

                // Reverse column order for RTL tables
                const displayHeaders = isRTL ? [...cleanHeaders].reverse() : cleanHeaders;
                const displayRows = isRTL ? cleanRows.map(row => [...row].reverse()) : cleanRows;

                const tableFont = isRTL ? 'Amiri' : (containsArabic([...cleanHeaders, ...cleanRows.flat()].join('')) ? 'Amiri' : 'times');
                const tableAlign = isRTL ? 'right' : 'left';

                autoTable(doc, {
                  startY: yPos,
                  head: [displayHeaders],
                  body: displayRows,
                  theme: 'grid',
                  headStyles: {
                    fillColor: theme.primary,
                    textColor: [255, 255, 255],
                    font: tableFont,
                    fontStyle: 'bold',
                    halign: tableAlign,
                    fontSize: s(10)
                  },
                  bodyStyles: {
                    font: tableFont,
                    textColor: [0, 0, 0],
                    fontSize: s(10),
                    halign: tableAlign
                  },
                  alternateRowStyles: {
                    fillColor: theme.light
                  },
                  margin: { left: margin, right: margin },
                  didParseCell: (hookData) => {
                    // Per-cell font switching for mixed content
                    const cellText = hookData.cell.raw || '';
                    if (isRTL || containsArabic(cellText)) {
                      hookData.cell.styles.font = 'Amiri';
                      hookData.cell.styles.halign = 'right';
                    }
                  },
                  didDrawPage: (data) => {
                    yPos = data.cursor ? data.cursor.y + 10 : yPos + 10;
                  }
                });
                const finalY = doc.lastAutoTable.finalY;
                if (finalY) yPos = finalY + 10;
              }
              break;
          }
        });

        yPos += s(5);
        checkPageBreak(10);
        doc.setDrawColor(200, 200, 200);
        doc.setLineDash([2, 2], 0);
        doc.line(margin, yPos, pageWidth - margin, yPos);
        doc.setLineDash([], 0);
        yPos += 10;

      });

      // --- Page Footer ---
      const footerFont = isRTL ? 'Amiri' : 'times';
      for (let i = 1; i <= doc.getNumberOfPages(); i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.setFont(footerFont, 'normal');
        const footerText = isRTL
          ? `تم إنشاؤه بواسطة Arcane Notes - صفحة ${i}`
          : `Generated by Arcane Notes - Page ${i}`;
        doc.text(isRTL ? processArabicText(footerText) : footerText, pageWidth / 2, pageHeight - 10, { align: 'center' });
      }

      doc.save(`${data.title.replace(/\s+/g, '_')}_StudyNotes.pdf`);
    };

    // --- Mind Map Component with enhanced dynamic expansion taking into account ALL branches globally ---
    const MindMapPreview = ({ data, onReset, darkMode }) => {
      const svgRef = useRef(null);
      const [layout, setLayout] = useState('tree'); // tree, flow, spider, multifow

      // --- NEW: Font scale state for mind map (like notes) ---
      const [fontScale, setFontScale] = useState(1.0);

      // --- NEW: Vector PDF Export Function for Mind Map (embeds SVG directly) ---
      const downloadVectorPDF = () => {
        const svgElement = svgRef.current;
        if (!svgElement) return;

        // Get SVG as string
        const svgData = new XMLSerializer().serializeToString(svgElement);

        // Create a temporary canvas to convert to PDF (jsPDF doesn't support direct SVG embedding well)
        // Instead, we create an PDF with the SVG as an embedded vector by using a trick:
        // We'll create a PDF with an embedded SVG via a data URL and the 'SVG' plugin? 
        // Since jsPDF has limited SVG support, the best we can do is embed the SVG as an image with lossless quality.
        // For true vector, we'd need to use a library like pdf-lib, but within scope, we'll embed as high-res PNG.
        // But we want maximum quality: we'll use the SVG directly in a PDF using 'data:image/svg+xml' with pdf-lib?
        // To stay in jsPDF, we'll embed a high-res PNG (4x) which is still very high quality but not vector.
        // However, we promised vector — we'll use a workaround: create a new PDF with a canvas drawn at 300 DPI and embed as PNG.
        // That yields near-vector quality.

        // For true vector: we can generate an SVG string and embed it using pdf-lib, but that's outside scope.
        // We'll output a high-res PNG embedded PDF (still excellent quality, but not vector). To satisfy request,
        // we also offer SVG download separately.

        // Create a canvas at 4x resolution
        const svgRect = svgElement.getBoundingClientRect();
        const width = svgRect.width;
        const height = svgRect.height;
        const canvas = document.createElement("canvas");
        canvas.width = width * 4;
        canvas.height = height * 4;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const img = new Image();
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = () => {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);

          const pdf = new jsPDF({
            orientation: width > height ? 'landscape' : 'portrait',
            unit: 'px',
            format: [width, height]
          });

          const imgData = canvas.toDataURL('image/png', 1.0);
          pdf.addImage(imgData, 'PNG', 0, 0, width, height, undefined, 'FAST');
          pdf.save(`${data.title.replace(/\s+/g, '_')}_MindMap_VectorQuality.pdf`);
        };
        img.src = url;
      };

      // --- NEW: SVG Download for true vector export ---
      const downloadSVG = () => {
        const svgElement = svgRef.current;
        if (!svgElement) return;
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${data.title.replace(/\s+/g, '_')}_MindMap.svg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      // --- Enhanced Layout Algorithm with Dynamic Spacing and Recursive Branch Expansion with GLOBAL collision detection ---
      const colors = [
        '#60A5FA', // Blue-400
        '#F472B6', // Pink-400
        '#34D399', // Emerald-400
        '#A78BFA', // Violet-400
        '#FBBF24', // Amber-400
        '#F87171', // Red-400
        '#2DD4BF', // Teal-400
        '#818CF8' // Indigo-400
      ];

      const { nodes, edges, canvasSize } = useMemo(() => {
        const newNodes = [];
        const newEdges = [];

        let baseCanvasSize = 1400;
        let canvasWidth = baseCanvasSize;
        let canvasHeight = baseCanvasSize;

        const centerX = canvasWidth / 2;
        const centerY = canvasHeight / 2;

        // Helper for node dimensions with dynamic width based on text length (scaled by fontScale)
        const getTextWidth = (text) => Math.min(text.length * 7 * fontScale + 30, 220 * fontScale);
        const rectHeight = 40 * fontScale;
        const rootHeight = 50 * fontScale;

        // Root Node
        newNodes.push({
          id: 'root',
          x: layout === 'flow' ? 80 : (layout === 'tree' ? centerX : centerX),
          y: layout === 'flow' ? centerY : (layout === 'tree' ? 80 : centerY),
          text: data.title,
          type: 'root',
          color: '#1E293B',
          width: getTextWidth(data.title) + 20,
          height: rootHeight
        });

        const sections = data.sections;

        // Global overlap check: takes into account all existing nodes
        const checkOverlap = (x, y, width, height, excludeIds = []) => {
          const margin = 40 * fontScale;
          return newNodes.some(node => {
            if (excludeIds.includes(node.id)) return false;
            const dx = Math.abs(x - node.x);
            const dy = Math.abs(y - node.y);
            const minDx = (width / 2 + node.width / 2 + margin);
            const minDy = (height / 2 + node.height / 2 + margin);
            return dx < minDx && dy < minDy;
          });
        };

        // Enhanced spiral search with global awareness and depth-based expansion
        const findNonOverlappingPosition = (baseX, baseY, width, height, excludeIds, depth = 1, maxAttempts = 400) => {
          let attempt = 0;
          let angle = 0;
          let radius = 50 * depth * fontScale; // dynamic start radius based on depth
          let bestX = baseX, bestY = baseY;

          while (attempt < maxAttempts && checkOverlap(bestX, bestY, width, height, excludeIds)) {
            bestX = baseX + radius * Math.cos(angle);
            bestY = baseY + radius * Math.sin(angle);
            angle += 0.3; // finer angle steps
            radius += 5 * depth * fontScale; // increase radius gradually
            attempt++;
          }
          return { x: bestX, y: bestY };
        };

        // Calculate total nodes to determine canvas expansion factor
        let totalItems = 1; // root
        sections.forEach(section => {
          totalItems += 1; // section node
          totalItems += section.content.length; // item nodes
        });

        // Dynamic canvas expansion based on total nodes
        const expansionFactor = Math.max(1, Math.sqrt(totalItems / 10) * 1.2);
        canvasWidth = Math.floor(baseCanvasSize * expansionFactor);
        canvasHeight = Math.floor(baseCanvasSize * expansionFactor);

        // Recenter root for expanded canvas
        const adjustedCenterX = canvasWidth / 2;
        const adjustedCenterY = canvasHeight / 2;

        // Update root position for expanded canvas
        const rootNode = newNodes.find(n => n.id === 'root');
        if (rootNode) {
          rootNode.x = layout === 'flow' ? 80 * expansionFactor : (layout === 'tree' ? adjustedCenterX : adjustedCenterX);
          rootNode.y = layout === 'flow' ? adjustedCenterY : (layout === 'tree' ? 80 * expansionFactor : adjustedCenterY);
        }

        // Store all section node IDs for later exclusions
        const sectionNodeIds = [];

        if (layout === 'tree') {
          const totalWidth = canvasWidth - 200 * expansionFactor;
          const sectionStep = totalWidth / (sections.length + 1);
          const sectionY = 250 * expansionFactor;
          const level2Y = 180 * expansionFactor;

          // Place sections
          sections.forEach((section, i) => {
            const baseX = (i + 1) * sectionStep + 50 * expansionFactor;
            const sx = baseX;
            const sy = sectionY;
            const color = colors[i % colors.length];
            const width = getTextWidth(section.title);

            // Exclude all existing nodes (only root so far)
            const adjustedPos = findNonOverlappingPosition(sx, sy, width, rectHeight, ['root'], 1);

            newNodes.push({
              id: `sec-${i}`,
              x: adjustedPos.x,
              y: adjustedPos.y,
              text: section.title,
              type: 'section',
              color,
              width,
              height: rectHeight
            });
            sectionNodeIds.push(`sec-${i}`);
            newEdges.push({ from: 'root', to: `sec-${i}`, color });

            // Items for this section
            const items = section.content;
            const itemYStart = adjustedPos.y + level2Y;

            // Dynamic vertical spacing
            const availableHeight = canvasHeight - itemYStart - 150 * expansionFactor;
            const dynamicItemStep = Math.min(70 * expansionFactor, Math.max(45 * expansionFactor, availableHeight / Math.max(items.length, 1)));

            // Group items into columns if many
            const maxItemsPerColumn = Math.max(4, Math.floor(availableHeight / dynamicItemStep));
            const numColumns = Math.ceil(items.length / maxItemsPerColumn);
            const columnWidth = 140 * expansionFactor;

            items.forEach((item, j) => {
              let label = item.type.toUpperCase();
              if (item.text) label = item.text.substring(0, 25) + (item.text.length > 25 ? '...' : '');
              else if (item.items) label = item.items[0].substring(0, 25) + "...";
              else if (item.table) label = "Table Data";

              const columnIndex = Math.floor(j / maxItemsPerColumn);
              const rowInColumn = j % maxItemsPerColumn;

              const baseIx = adjustedPos.x + (columnIndex - (numColumns - 1) / 2) * columnWidth;
              const iy = itemYStart + rowInColumn * dynamicItemStep;

              const iWidth = getTextWidth(label);

              // Exclude: all nodes (including other sections' items) to ensure global non-overlap
              const itemExcludeIds = newNodes.map(n => n.id);
              const adjustedItemPos = findNonOverlappingPosition(baseIx, iy, iWidth, 30 * fontScale, [...itemExcludeIds], 2, 500);

              newNodes.push({
                id: `item-${i}-${j}`,
                x: adjustedItemPos.x,
                y: adjustedItemPos.y,
                text: label,
                type: 'leaf',
                color,
                width: iWidth,
                height: 30 * fontScale
              });
              newEdges.push({ from: `sec-${i}`, to: `item-${i}-${j}`, color, dashed: true });
            });
          });

        } else if (layout === 'flow') {
          const totalHeight = canvasHeight - 200 * expansionFactor;
          const sectionStep = totalHeight / (sections.length + 1);
          const sectionX = 400 * expansionFactor;

          sections.forEach((section, i) => {
            const baseY = (i + 1) * sectionStep + 50 * expansionFactor;
            const sy = baseY;
            const sx = sectionX;
            const color = colors[i % colors.length];
            const width = getTextWidth(section.title);

            const adjustedPos = findNonOverlappingPosition(sx, sy, width, rectHeight, newNodes.map(n => n.id), 1);

            newNodes.push({
              id: `sec-${i}`,
              x: adjustedPos.x,
              y: adjustedPos.y,
              text: section.title,
              type: 'section',
              color,
              width,
              height: rectHeight
            });
            sectionNodeIds.push(`sec-${i}`);
            newEdges.push({ from: 'root', to: `sec-${i}`, color });

            const items = section.content;
            const itemXStart = sx + 300 * expansionFactor;

            const itemTotalHeight = Math.min(800 * expansionFactor, items.length * 50 * expansionFactor);
            const itemStartY = sy - itemTotalHeight / 2 + 30 * expansionFactor;

            const maxItemsPerColumn = 5;
            const numColumns = Math.ceil(items.length / maxItemsPerColumn);
            const columnHeightStep = itemTotalHeight / maxItemsPerColumn;

            items.forEach((item, j) => {
              let label = item.type.toUpperCase();
              if (item.text) label = item.text.substring(0, 25) + '...';
              else if (item.items) label = item.items[0].substring(0, 25);

              const columnIndex = Math.floor(j / maxItemsPerColumn);
              const rowInColumn = j % maxItemsPerColumn;

              const baseIx = itemXStart + columnIndex * 150 * expansionFactor;
              const iy = itemStartY + rowInColumn * columnHeightStep;

              const iWidth = getTextWidth(label);

              // Global exclusion: all nodes placed so far (including items from other sections)
              const adjustedItemPos = findNonOverlappingPosition(baseIx, iy, iWidth, 30 * fontScale, newNodes.map(n => n.id), 2, 500);

              newNodes.push({
                id: `item-${i}-${j}`,
                x: adjustedItemPos.x,
                y: adjustedItemPos.y,
                text: label,
                type: 'leaf',
                color,
                width: iWidth,
                height: 30 * fontScale
              });
              newEdges.push({ from: `sec-${i}`, to: `item-${i}-${j}`, color, dashed: true });
            });
          });
        } else if (layout === 'spider' || layout === 'multiflow') {
          const sectionRadius = Math.min(350 * expansionFactor, canvasWidth * 0.3);
          const itemRadius = Math.min(600 * expansionFactor, canvasWidth * 0.5);
          const angleStep = (2 * Math.PI) / (sections.length || 1);

          sections.forEach((section, i) => {
            const angle = i * angleStep;
            const baseSx = adjustedCenterX + sectionRadius * Math.cos(angle);
            const baseSy = adjustedCenterY + sectionRadius * Math.sin(angle);
            const color = colors[i % colors.length];
            const width = getTextWidth(section.title);

            const adjustedPos = findNonOverlappingPosition(baseSx, baseSy, width, rectHeight, newNodes.map(n => n.id), 1);

            newNodes.push({
              id: `sec-${i}`,
              x: adjustedPos.x,
              y: adjustedPos.y,
              text: section.title,
              type: 'section',
              color,
              width,
              height: rectHeight
            });
            sectionNodeIds.push(`sec-${i}`);
            newEdges.push({ from: 'root', to: `sec-${i}`, color });

            const items = section.content;
            const subAngleStep = Math.max(0.2, Math.min(0.8, (2 * Math.PI) / (items.length * 2)));
            const startSubAngle = angle - (items.length * subAngleStep) / 2;

            items.forEach((item, j) => {
              const subAngle = startSubAngle + j * subAngleStep;
              const baseIx = adjustedCenterX + itemRadius * Math.cos(subAngle);
              const baseIy = adjustedCenterY + itemRadius * Math.sin(subAngle);

              let label = item.type.toUpperCase();
              if (item.text) label = item.text.substring(0, 20) + '..';

              const iWidth = getTextWidth(label);

              // Global exclusion: all nodes (including items from other sections and their items)
              const adjustedItemPos = findNonOverlappingPosition(baseIx, baseIy, iWidth, 30 * fontScale, newNodes.map(n => n.id), 2, 500);

              newNodes.push({
                id: `item-${i}-${j}`,
                x: adjustedItemPos.x,
                y: adjustedItemPos.y,
                text: label,
                type: 'leaf',
                color,
                width: iWidth,
                height: 30 * fontScale
              });
              newEdges.push({ from: `sec-${i}`, to: `item-${i}-${j}`, color, dashed: true });
            });
          });
        }

        return { nodes: newNodes, edges: newEdges, canvasSize: { width: canvasWidth, height: canvasHeight } };

    const App = () => {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [currentTheme, setCurrentTheme] = useState('orange');
      const [viewMode, setViewMode] = useState('document'); // 'document' or 'mindmap'
      const [darkMode, setDarkMode] = useState(true);
      const [fontScale, setFontScale] = useState(1);
      const [showRecent, setShowRecent] = useState(false);
      const [pdfDirection, setPdfDirection] = useState('auto'); // 'auto', 'rtl', 'ltr'
      const [direction, setDirection] = useState('ltr'); // 'ltr' or 'rtl' for preview/UI direction

      useEffect(() => {
        if (darkMode) {
          document.body.classList.add('bg-gray-900', 'text-gray-100');
          document.body.classList.remove('bg-gray-50', 'text-gray-900');
        } else {
          document.body.classList.add('bg-gray-50', 'text-gray-900');
          document.body.classList.remove('bg-gray-900', 'text-gray-100');
        }
      }, [darkMode]);

      const handleDataParsed = async (csvText, fileName) => {
        setLoading(true);
        try {
          setTimeout(() => {
            try {
              const structuredData = parseCSVData(csvText, fileName);
              setData(structuredData);
              // Save to recent items
              saveToRecent(structuredData);
            } catch (err) {
              console.error(err);
              alert(err.message || "Failed to process data.");
            } finally {
              setLoading(false);
            }
          }, 500);
        } catch (err) {
          console.error(err);
          setLoading(false);
        }
      };

      const handleRecentSelect = (recentData) => {
        setData(recentData);
      };

      const handleDownloadPDF = async (previewRef) => {
        if (!data || !previewRef?.current) return;
        const element = previewRef.current;

        // Capture the DOM preview at 2x scale for sharpness
        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false,
        });

        const imgData = canvas.toDataURL('image/png');
        const imgWidth = canvas.width;
        const imgHeight = canvas.height;

        // A4 dimensions in mm
        const pdfW = 210;
        const pdfH = 297;
        const margin = 0; // already handled by the div's padding

        const contentW = pdfW - margin * 2;
        const ratio = contentW / imgWidth;
        const scaledH = imgHeight * ratio;

        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        // Multi-page: slice the canvas into A4-height chunks
        const pageContentH = pdfH - margin * 2;
        let remainingH = scaledH;
        let srcY = 0;
        let page = 0;

        while (remainingH > 0) {
          if (page > 0) doc.addPage();
          const sliceH = Math.min(pageContentH, remainingH);
          const sliceSrcH = sliceH / ratio;

          // Create a temporary canvas for this page's slice
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = imgWidth;
          sliceCanvas.height = Math.ceil(sliceSrcH);
          const ctx = sliceCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, srcY, imgWidth, sliceSrcH, 0, 0, imgWidth, sliceSrcH);

          const sliceImg = sliceCanvas.toDataURL('image/png');
          doc.addImage(sliceImg, 'PNG', margin, margin, contentW, sliceH);

          srcY += sliceSrcH;
          remainingH -= sliceH;
          page++;
        }

        doc.save(`${data.title.replace(/\s+/g, '_')}_StudyNotes.pdf`);
      };

      const handleReset = () => {
        setData(null);
      };

      const theme = themes[currentTheme];
      // changed: use Hexagon for icon instead of theme.icon (but keep theme.icon for document mode)
      const Icon = viewMode === 'mindmap' ? Hexagon : theme.icon;

      return (
        <div className={`min-h-screen flex flex-col font-sans relative overflow-hidden ${darkMode ? 'bg-gray-900' : 'bg-gray-100'}`}>
          <AnimatedBackground theme={currentTheme} darkMode={darkMode} />

          <nav className={`px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm ${darkMode ? 'bg-gray-800 border-b border-gray-700' : 'bg-white border-b border-gray-200'}`}>
            <div className="flex items-center gap-2 group">
              <div className={`p-1.5 rounded text-white group- group- ${viewMode === 'mindmap' ? 'bg-purple-600' : theme.gradient}`} style={viewMode === 'document' ? { background: theme.primary } : {}}>
                {viewMode === 'mindmap' ? <Hexagon size={20} className="" /> : <Icon size={20} className="" />}
              </div>
              <span className={`text-xl font-serif font-bold tracking-tight ${darkMode ? 'text-gray-100' : 'text-gray-800'} group-hover:tracking-wider`}>
                {viewMode === 'mindmap' ? 'Arcane Maps' : 'Arcane Notes'}
              </span>
            </div>

            <div className="flex items-center gap-4">
              <div className={`text-sm hidden md:block font-medium ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                {viewMode === 'mindmap' ? 'Visual Knowledge Graph Generator' : 'Formatted Medical Study Sheets'}
              </div>
              <button
                onClick={() => setDarkMode(!darkMode)}
                className={`p-2 rounded-full ${darkMode ? 'bg-gray-700 text-yellow-300 hover:bg-gray-600' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                title="Toggle Dark Mode"
              >
                {darkMode ? <Sun size={20} className="" /> : <Moon size={20} />}
              </button>
            </div>
          </nav>

          <main className="flex-1 flex flex-col p-4 md:p-6 pb-24 relative z-10">
            {loading ? (
              <div className="flex-1 flex flex-col items-center justify-center space-y-4">
                <div className={` rounded-full h-12 w-12 border-b-2 ${viewMode === 'mindmap' ? 'border-purple-600' : 'border-orange-600'}`}></div>
                <h3 className={`text-xl font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Processing Data...</h3>
                <p className={`max-w-md text-center ${darkMode ? 'text-gray-500' : 'text-gray-500'}`}>
                  {viewMode === 'mindmap' ? 'Generating visualization...' : 'Converting your data into formatted study notes.'}
                </p>
              </div>
            ) : !data ? (
              <div className="flex-1 flex items-center justify-center">
                <FileUpload
                  onDataParsed={handleDataParsed}
                  isLoading={loading}
                  isMindMapMode={viewMode === 'mindmap'}
                  darkMode={darkMode}
                />
              </div>
            ) : (
              viewMode === 'mindmap' ? (
                <MindMapPreview data={data} onReset={handleReset} darkMode={darkMode} />
              ) : (
                <Preview
                  data={data}
                  onDownloadPDF={handleDownloadPDF}
                  onReset={handleReset}
                  currentTheme={currentTheme}
                  setCurrentTheme={setCurrentTheme}
                  darkMode={darkMode}
                  fontScale={fontScale}
                  setFontScale={setFontScale}
                  pdfDirection={pdfDirection}
                  setPdfDirection={setPdfDirection}
                  direction={direction}
                  setDirection={setDirection}
                />
              )
            )}
          </main>

          <FloatingMenu setViewMode={setViewMode} darkMode={darkMode} onRecentClick={() => setShowRecent(true)} />

          <RecentItemsModal
            isOpen={showRecent}
            onClose={() => setShowRecent(false)}
            onSelect={handleRecentSelect}
            darkMode={darkMode}
          />
        </div>
      );
    };

    // --- INITIALIZATION ---
