<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير البرومبتات الذكي - النسخة الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-indigo-400">مدير البرومبتات</h1>
                <p class="text-slate-400 text-sm mt-1">نظام استيراد آمن ومباشر من جوجل شيت</p>
            </div>
            <div id="sync-status" class="px-4 py-2 rounded-lg bg-slate-900 border border-slate-800 text-xs text-slate-400">
                جاري الاتصال...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-4 flex flex-col gap-4">
                <input type="text" id="search" placeholder="ابحث في العناوين أو المحتوى..." 
                       class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-indigo-500">
                <div id="list" class="flex flex-col gap-2 overflow-y-auto max-h-[60vh] pr-1">
                    </div>
            </section>

            <section class="lg:col-span-8 flex flex-col h-[70vh]">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 flex flex-col h-full shadow-2xl">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-4">
                        <h2 id="active-title" class="text-xl font-bold text-indigo-300">اختر برومبت للعرض</h2>
                        <button id="copy-btn" class="hidden bg-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-500 transition">نسخ النص</button>
                    </div>
                    <pre id="active-body" class="flex-1 bg-slate-950 p-4 rounded-lg overflow-y-auto whitespace-pre-wrap text-sm leading-relaxed text-slate-300 border border-slate-800"></pre>
                </div>
            </section>
        </div>
    </div>

    <script>
        const SHEET_ID = "1TW8HooLYJhAVyzgJIOOSWaH4OxbM62FEoGtAdiA6h8E";
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        let prompts = [];

        async function init() {
            try {
                const res = await fetch(URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                prompts = json.table.rows.map(r => ({
                    title: r.c[0]?.v || "",
                    content: r.c[1]?.v || ""
                })).filter(p => p.title && p.title !== "Prompt_Title");
                
                render(prompts);
                document.getElementById('sync-status').innerText = "متصل بنجاح";
            } catch (e) {
                document.getElementById('sync-status').innerText = "خطأ في الاتصال";
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = "";
            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-900 border border-slate-800 rounded-lg cursor-pointer hover:bg-slate-800 transition";
                div.innerHTML = `<h3 class="font-bold">${item.title}</h3><p class="text-xs text-slate-500 truncate">${item.content.substring(0, 50)}...</p>`;
                div.onclick = () => {
                    document.getElementById('active-title').innerText = item.title;
                    document.getElementById('active-body').innerText = item.content;
                    document.getElementById('copy-btn').classList.remove('hidden');
                };
                list.appendChild(div);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            render(prompts.filter(p => p.title.toLowerCase().includes(term) || p.content.toLowerCase().includes(term)));
        };

        document.getElementById('copy-btn').onclick = () => {
            const text = document.getElementById('active-body').innerText;
            navigator.clipboard.writeText(text).then(() => alert("تم نسخ البرومبت بنجاح!"));
        };

        init();
    </script>
</body>
</html>
