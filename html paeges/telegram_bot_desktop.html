<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Master</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #c02323 0%, #0400ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --tg-bg: #0e1621;
            --tg-bubble: #182533;
            --tg-btn: #2b5278;
            --tg-text: #ffffff;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            width: 1400px;
            max-width: 95%;
            height: 85vh;
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        h2 { margin: 0; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 100px;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        
        input, textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 12px 15px 12px 40px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); background: rgba(0, 0, 0, 0.4); }

        /* --- Text Formatting Toolbar --- */
        .format-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }
        .format-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .format-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* --- Builder Area --- */
        .builder-area {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            padding: 20px;
            border: 1px dashed var(--glass-border);
            position: relative;
        }

        .builder-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .rows-container { display: flex; flex-direction: column; gap: 10px; }
        .row-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px; padding: 8px; display: flex; gap: 8px; transition: 0.3s; border: 1px solid transparent;
        }
        .row-wrapper:hover { border-color: var(--glass-border); background: rgba(255, 255, 255, 0.06); }

        .btn-slot {
            flex: 1; background: var(--tg-btn); color: var(--primary); border-radius: 8px; padding: 12px;
            text-align: center; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden;
        }
        .btn-slot:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-slot.empty { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px dashed var(--text-muted); }

        .row-controls { display: flex; flex-direction: column; gap: 2px; justify-content: center; opacity: 0; transition: 0.2s; margin-left: 5px; }
        .row-wrapper:hover .row-controls { opacity: 1; }
        .mini-btn { width: 20px; height: 20px; border-radius: 4px; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .mini-btn:hover { background: var(--primary); }
        .mini-btn.del:hover { background: #ef4444; }

        .add-row-btn {
            margin-top: 15px; width: 100%; padding: 12px; background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--primary); color: var(--primary); border-radius: 12px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .add-row-btn:hover { background: var(--primary); color: white; }

        .phone-frame {
            background: #000; border-radius: 40px; padding: 12px;
            box-shadow: 0 0 0 8px #1a1a1a, 0 30px 80px rgba(0,0,0,0.8);
            height: 100%; overflow: hidden; position: relative;
        }
        .screen { background: var(--tg-bg); border-radius: 32px; height: 100%; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .status-bar { height: 30px; display: flex; justify-content: space-between; padding: 0 20px; align-items: center; font-size: 12px; color: white; font-weight: bold; }
        .app-header { background: #17212b; padding: 15px; display: flex; align-items: center; gap: 15px; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .avatar { width: 35px; height: 35px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble {
            background: var(--tg-bubble); padding: 10px 15px; border-radius: 16px 16px 16px 0; max-width: 90%;
            color: white; font-size: 14px; line-height: 1.5; align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: pre-wrap; word-break: break-word; transition: opacity 0.3s;
        }
        .inline-kb { display: flex; flex-direction: column; gap: 5px; width: 90%; margin-top: 5px; }
        .kb-row { display: flex; gap: 5px; width: 100%; }
        .kb-btn {
            background: rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px;
            text-align: center; font-size: 13px; font-weight: 600; flex: 1; position: relative; cursor: default;
        }
        .kb-btn i { position: absolute; top: 2px; right: 2px; font-size: 8px; opacity: 0.7; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal {
            background: #1e293b; border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 20px; width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-bar { display: flex; gap: 10px; margin-top: 20px; }
        .btn-primary { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }
        .btn-secondary { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #334155; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 12px 25px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); font-weight: bold;
            display: none; align-items: center; gap: 10px; z-index: 200;
        }
        
        /* Toggle Switch Update */
        .toggle-switch { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 8px; margin-bottom: 20px; }
        .toggle-option { flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: bold; color: var(--text-muted); transition: 0.3s; }
        
        /* Active states for toggle */
        #modeNew.active { background: var(--primary); color: white; }
        #modeEdit.active { background: var(--warning); color: white; }
        #modeButtons.active { background: var(--success); color: white; }

        /* Helpers to hide/show sections */
        .hidden { display: none !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="panel">
            <div class="editor-header">
                <h2><i class="fa-solid fa-robot"></i> Telegram Architect</h2>
                <div style="font-size: 12px; color: var(--success);">● متصل بالنظام</div>
            </div>

            <div class="toggle-switch">
                <div class="toggle-option active" id="modeNew" onclick="setMode('new')">رسالة جديدة</div>
                <div class="toggle-option" id="modeEdit" onclick="setMode('edit')">تعديل نص</div>
                <div class="toggle-option" id="modeButtons" onclick="setMode('buttons')">أزرار فقط</div>
            </div>

            <div class="config-grid">
                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="botToken" placeholder="Bot Token" onchange="saveCreds()">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-user-group"></i>
                    <input type="text" id="chatId" placeholder="Chat ID" onchange="saveCreds()">
                </div>
                <div class="input-group" id="msgIdGroup" style="display: none; opacity: 0; transition: 0.3s;">
                    <i class="fa-solid fa-hashtag"></i>
                    <input type="text" id="msgId" placeholder="Msg ID">
                </div>
            </div>

            <div id="textContentSection">
                <div class="builder-label">محتوى الرسالة (يدعم HTML)</div>
                <div class="format-toolbar">
                    <button class="format-btn" onclick="formatText('bold')" title="خط عريض"><i class="fa-solid fa-bold"></i></button>
                    <button class="format-btn" onclick="formatText('italic')" title="خط مائل"><i class="fa-solid fa-italic"></i></button>
                    <button class="format-btn" onclick="formatText('underline')" title="تسطير"><i class="fa-solid fa-underline"></i></button>
                    <button class="format-btn" onclick="formatText('strike')" title="مشطوب"><i class="fa-solid fa-strikethrough"></i></button>
                    <button class="format-btn" onclick="formatText('spoiler')" title="إخفاء النص"><i class="fa-solid fa-eye-slash"></i></button>
                    <button class="format-btn" onclick="formatText('code')" title="نسخ (Code)"><i class="fa-solid fa-code"></i></button>
                    <button class="format-btn" onclick="createLink()" title="رابط"><i class="fa-solid fa-link"></i></button>
                </div>
                <textarea id="msgText" rows="4" placeholder="اكتب رسالتك هنا..." oninput="updatePreview()"></textarea>
            </div>

            <div class="builder-label" style="margin-top: 20px;">هيكل الأزرار (Grid System)</div>
            <div class="builder-area">
                <div id="rowsContainer" class="rows-container"></div>
                <button class="add-row-btn" onclick="addRow()">
                    <i class="fa-solid fa-plus"></i> إضافة صف جديد
                </button>
            </div>

            <button class="btn-primary" id="actionBtn" style="margin-top: auto; padding: 15px; font-size: 16px; background: linear-gradient(90deg, var(--primary), var(--accent)); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);" onclick="sendTelegramRequest()">
                <i class="fa-solid fa-paper-plane"></i> إرسال الرسالة
            </button>
        </div>

        <div class="phone-frame">
            <div class="screen">
                <div class="status-bar">
                    <span>9:41</span>
                    <span><i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
                </div>
                <div class="app-header">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div>
                        <div style="line-height: 1.2;">Bot Name</div>
                        <div style="font-size: 11px; color: #6ab3f3; font-weight: normal;">bot</div>
                    </div>
                </div>
                <div class="chat-area">
                    <div class="msg-bubble" id="previewText">
                        مرحباً بك في المحرر المتطور...
                    </div>
                    <div class="inline-kb" id="previewKb"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="btnModal">
        <div class="modal">
            <h3 style="margin-top: 0; color: white;">تخصيص الزر</h3>
            <div style="margin-bottom: 15px;">
                <label class="builder-label">نص الزر</label>
                <input type="text" id="modalBtnText" placeholder="مثال: زيارة الموقع">
            </div>
            <div style="margin-bottom: 15px;">
                <label class="builder-label">نوع الإجراء</label>
                <select id="modalBtnType" onchange="toggleBtnInput()">
                    <option value="url">رابط خارجي (URL)</option>
                    <option value="callback_data">بيانات تفاعلية (Callback)</option>
                    <option value="switch_inline_query">تحويل (Switch Query)</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="builder-label" id="modalValueLabel">الرابط</label>
                <input type="text" id="modalBtnValue" placeholder="https://...">
            </div>
            <div class="action-bar">
                <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
                <button class="btn-primary" onclick="saveButtonChanges()">حفظ التعديل</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notify">
        <i class="fa-solid fa-check-circle"></i> <span id="notifyMsg">تم الإرسال بنجاح</span>
    </div>

<script>
    let currentMode = 'new';
    let buttonGrid = [];
    let editingCoords = null;

    window.onload = () => {
        loadCreds();
        buttonGrid.push([{ text: 'زر تجريبي', type: 'url', value: 'https://google.com' }]);
        renderGrid();
        updatePreview();
    };

    function saveCreds() {
        localStorage.setItem('tg_token', document.getElementById('botToken').value);
        localStorage.setItem('tg_chat', document.getElementById('chatId').value);
    }
    function loadCreds() {
        if(localStorage.getItem('tg_token')) document.getElementById('botToken').value = localStorage.getItem('tg_token');
        if(localStorage.getItem('tg_chat')) document.getElementById('chatId').value = localStorage.getItem('tg_chat');
    }

    // --- TEXT FORMATTING ---
    function formatText(type) {
        const textarea = document.getElementById('msgText');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = textarea.value.substring(start, end);
        
        if (!selectedText) { showNotification("حدد النص أولاً!", "error"); return; }
        
        let formatted = "";
        switch(type) {
            case 'bold': formatted = `<b>${selectedText}</b>`; break;
            case 'italic': formatted = `<i>${selectedText}</i>`; break;
            case 'underline': formatted = `<u>${selectedText}</u>`; break;
            case 'strike': formatted = `<s>${selectedText}</s>`; break;
            case 'spoiler': formatted = `<span class="tg-spoiler">${selectedText}</span>`; break;
            case 'code': formatted = `<code>${selectedText}</code>`; break;
        }
        
        replaceSelection(textarea, formatted);
        updatePreview();
    }

    function createLink() {
        const textarea = document.getElementById('msgText');
        const selectedText = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
        if(!selectedText) { showNotification('حدد النص أولاً', 'error'); return; }
        
        const url = prompt('أدخل الرابط:', 'https://');
        if(url) {
            const formatted = `<a href="${url}">${selectedText}</a>`;
            replaceSelection(textarea, formatted);
            updatePreview();
        }
    }

    function replaceSelection(field, newText) {
        const start = field.selectionStart;
        const end = field.selectionEnd;
        field.value = field.value.substring(0, start) + newText + field.value.substring(end);
        field.focus();
        field.selectionStart = field.selectionEnd = start + newText.length;
    }

    // --- MODE SWITCHING LOGIC (UPDATED) ---
    function setMode(mode) {
        currentMode = mode;
        // Update Tabs UI
        document.querySelectorAll('.toggle-option').forEach(el => el.classList.remove('active'));
        if(mode === 'new') document.getElementById('modeNew').classList.add('active');
        if(mode === 'edit') document.getElementById('modeEdit').classList.add('active');
        if(mode === 'buttons') document.getElementById('modeButtons').classList.add('active');

        // Logic for Fields Visibility
        const msgIdGroup = document.getElementById('msgIdGroup');
        const textSection = document.getElementById('textContentSection');
        const actionBtn = document.getElementById('actionBtn');

        if (mode === 'new') {
            msgIdGroup.style.display = 'none';
            textSection.style.display = 'block';
            actionBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال رسالة جديدة';
        } 
        else if (mode === 'edit') {
            msgIdGroup.style.display = 'block'; setTimeout(() => msgIdGroup.style.opacity = '1', 10);
            textSection.style.display = 'block';
            actionBtn.innerHTML = '<i class="fa-solid fa-pen"></i> تحديث النص والأزرار';
        } 
        else if (mode === 'buttons') {
            msgIdGroup.style.display = 'block'; setTimeout(() => msgIdGroup.style.opacity = '1', 10);
            textSection.style.display = 'none'; // Hide text editor
            actionBtn.innerHTML = '<i class="fa-solid fa-gamepad"></i> تحديث الأزرار فقط';
        }
    }

    // --- GRID SYSTEM ---
    function renderGrid() {
        const container = document.getElementById('rowsContainer');
        container.innerHTML = '';
        buttonGrid.forEach((row, rowIndex) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-wrapper';
            row.forEach((btn, colIndex) => {
                const btnSlot = document.createElement('div');
                btnSlot.className = 'btn-slot';
                btnSlot.innerHTML = `${getIconByType(btn.type)} ${btn.text}`;
                btnSlot.onclick = () => openEditModal(rowIndex, colIndex);
                rowDiv.appendChild(btnSlot);
            });
            if (row.length < 8) {
                const addSlot = document.createElement('div');
                addSlot.className = 'btn-slot empty';
                addSlot.innerHTML = '<i class="fa-solid fa-plus"></i>';
                addSlot.onclick = () => addButtonToRow(rowIndex);
                addSlot.title = "إضافة زر بجانب هذا الزر";
                rowDiv.appendChild(addSlot);
            }
            const controls = document.createElement('div');
            controls.className = 'row-controls';
            controls.innerHTML = `
                <button class="mini-btn del" onclick="deleteRow(${rowIndex})" title="حذف الصف"><i class="fa-solid fa-trash"></i></button>
                <button class="mini-btn" onclick="moveRow(${rowIndex}, -1)" title="تحريك للأعلى"><i class="fa-solid fa-chevron-up"></i></button>
                <button class="mini-btn" onclick="moveRow(${rowIndex}, 1)" title="تحريك للأسفل"><i class="fa-solid fa-chevron-down"></i></button>
            `;
            rowDiv.appendChild(controls);
            container.appendChild(rowDiv);
        });
        updatePreview();
    }

    function addRow() { buttonGrid.push([{ text: 'زر جديد', type: 'url', value: 'https://' }]); renderGrid(); }
    function addButtonToRow(rowIndex) { buttonGrid[rowIndex].push({ text: 'زر فرعي', type: 'callback_data', value: 'action' }); renderGrid(); }
    function deleteRow(index) { if(confirm('حذف هذا الصف؟')) { buttonGrid.splice(index, 1); renderGrid(); } }
    function moveRow(index, direction) {
        if (index + direction < 0 || index + direction >= buttonGrid.length) return;
        const temp = buttonGrid[index]; buttonGrid[index] = buttonGrid[index + direction]; buttonGrid[index + direction] = temp; renderGrid();
    }

    function openEditModal(row, col) {
        editingCoords = { row, col };
        const btn = buttonGrid[row][col];
        document.getElementById('modalBtnText').value = btn.text;
        document.getElementById('modalBtnType').value = btn.type;
        document.getElementById('modalBtnValue').value = btn.value;
        toggleBtnInput();
        document.getElementById('btnModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('btnModal').style.display = 'none'; editingCoords = null; }
    function saveButtonChanges() {
        if (!editingCoords) return;
        const txt = document.getElementById('modalBtnText').value;
        const type = document.getElementById('modalBtnType').value;
        const val = document.getElementById('modalBtnValue').value;
        if(!txt || !val) { showNotification('يرجى ملء جميع الحقول', 'error'); return; }
        buttonGrid[editingCoords.row][editingCoords.col] = { text: txt, type: type, value: val };
        closeModal(); renderGrid();
    }
    function toggleBtnInput() {
        const type = document.getElementById('modalBtnType').value;
        const label = document.getElementById('modalValueLabel');
        const input = document.getElementById('modalBtnValue');
        if (type === 'url') { label.innerText = 'رابط الموقع (URL)'; input.placeholder = 'https://example.com'; }
        else if (type === 'callback_data') { label.innerText = 'بيانات الاستدعاء (Data)'; input.placeholder = 'like_id_123'; }
        else { label.innerText = 'نص التحويل'; input.placeholder = 'اكتب شيئاً...'; }
    }

    function updatePreview() {
        const text = document.getElementById('msgText').value || "معاينة الرسالة...";
        const formattedText = text.replace(/\n/g, '<br>')
            .replace(/<b>(.*?)<\/b>/g, '<strong>$1</strong>')
            .replace(/<i>(.*?)<\/i>/g, '<em>$1</em>')
            .replace(/<u>(.*?)<\/u>/g, '<u>$1</u>')
            .replace(/<s>(.*?)<\/s>/g, '<strike>$1</strike>')
            .replace(/<a href="(.*?)">(.*?)<\/a>/g, '<a href="#" style="color:#6ab3f3">$2</a>');
        
        document.getElementById('previewText').innerHTML = formattedText;
        const kbContainer = document.getElementById('previewKb'); kbContainer.innerHTML = '';
        buttonGrid.forEach(row => {
            const kbRow = document.createElement('div'); kbRow.className = 'kb-row';
            row.forEach(btn => {
                const kbBtn = document.createElement('div'); kbBtn.className = 'kb-btn';
                kbBtn.innerHTML = `${btn.text} ${getIconByType(btn.type, true)}`;
                if (btn.type === 'url') kbBtn.style.color = '#6ab3f3';
                kbRow.appendChild(kbBtn);
            });
            kbContainer.appendChild(kbRow);
        });
    }

    function getIconByType(type, isPreview = false) {
        if (type === 'url') return isPreview ? '<i class="fa-solid fa-arrow-up-right-from-square"></i>' : '<i class="fa-solid fa-link"></i>';
        if (type === 'callback_data') return isPreview ? '' : '<i class="fa-solid fa-bolt"></i>';
        return isPreview ? '<i class="fa-solid fa-share"></i>' : '<i class="fa-solid fa-share"></i>';
    }

    async function sendTelegramRequest() {
        const token = document.getElementById('botToken').value;
        const chatId = document.getElementById('chatId').value;
        const text = document.getElementById('msgText').value;
        const msgId = document.getElementById('msgId').value;

        if (!token || !chatId) { showNotification('البيانات ناقصة!', 'error'); return; }

        let inlineKeyboard = buttonGrid.map(row => {
            return row.map(btn => {
                let obj = { text: btn.text }; obj[btn.type] = btn.value; return obj;
            });
        });

        let endpoint = 'sendMessage';
        let body = { chat_id: chatId, parse_mode: 'HTML', reply_markup: { inline_keyboard: inlineKeyboard } };

        if (currentMode === 'new') { 
            body.text = text; 
            if(!text) { showNotification('النص مطلوب!', 'error'); return; }
        }
        else if (currentMode === 'edit') {
            if (!msgId) { showNotification('رقم الرسالة مطلوب!', 'error'); return; }
            endpoint = 'editMessageText'; body.message_id = msgId; body.text = text;
        }
        else if (currentMode === 'buttons') {
            if (!msgId) { showNotification('رقم الرسالة مطلوب!', 'error'); return; }
            endpoint = 'editMessageReplyMarkup'; 
            body.message_id = msgId;
            // No text field in this mode
        }

        const sendBtn = document.getElementById('actionBtn');
        const oldText = sendBtn.innerHTML;
        sendBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جارٍ الاتصال...';

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/${endpoint}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
            });
            const data = await response.json();
            if (data.ok) showNotification('تم تنفيذ العملية بنجاح! 🚀', 'success');
            else showNotification('خطأ: ' + data.description, 'error');
        } catch (e) { showNotification('خطأ في الشبكة', 'error'); }
        sendBtn.innerHTML = oldText;
    }

    function showNotification(msg, type) {
        const notif = document.getElementById('notify');
        const icon = type === 'success' ? '<i class="fa-solid fa-check-circle"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
        const color = type === 'success' ? '#10b981' : '#ef4444';
        notif.style.background = color; notif.innerHTML = `${icon} ${msg}`;
        notif.style.display = 'flex'; notif.style.animation = 'popIn 0.5s';
        setTimeout(() => { notif.style.display = 'none'; }, 4000);
    }
</script>
